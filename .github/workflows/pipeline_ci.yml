name: Pipeline Main CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and test on main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        working-directory: pipelineProject
        run: npm ci

      - name: Run tests
        working-directory: pipelineProject
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build   # garante que deploy só roda se build passar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simular Deploy
        run: echo "Deploy realizado com sucesso!"